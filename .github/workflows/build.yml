name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup Maven and Java Action
      uses: s4u/setup-maven-action@v1.18.0
      with:
        java-version: '17'
        maven-version: '3.9.6'

    - name: Build
      run: mvn --batch-mode install -DskipTests

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eic-phoebus-${{ matrix.os }}
        path: |
          ${{ github.workspace }}/target/*.jar
          ${{ github.workspace }}/target/eic-phoebus-*.zip
          ${{ github.workspace }}/target/eic-phoebus-*.tar.gz

